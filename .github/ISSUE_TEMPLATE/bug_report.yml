name: Bug report
description: Report a problem with procmon-mcp (Windows Python MCP server)
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. Please fill out the sections below.

        **procmon-mcp** runs only on Windows and requires Python 3.10+.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A short summary of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that someone else can follow.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead, including error messages if any.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### Environment"

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: E.g. Windows 11 23H2 (build 22631.x).
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version` or the interpreter you use for the MCP server.
    validations:
      required: true

  - type: dropdown
    id: elevated
    attributes:
      label: Running elevated (Administrator)
      description: Process Monitor and related capture often need elevation.
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP client used
      options:
        - Cursor
        - Claude Desktop
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, config snippets, or anything else that helps. Optional.
    validations:
      required: false
